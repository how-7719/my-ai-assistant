name: Deploy Ming's AI Assistant

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-with: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check files and Inject API Key
        run: |
          # 1. 先列出所有檔案，確認 main.js 在哪裡
          echo "目前目錄下的檔案有："
          ls -R

          # 2. 檢查 Secret 是否存在
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "❌ 錯誤：找不到 GEMINI_API_KEY Secret！"
            exit 1
          fi

          # 3. 執行替換 (使用雙引號確保變數注入)
          # 如果你的 main.js 在根目錄，這行會生效
          sed -i "s@__API_KEY_PLACEHOLDER__@${{ secrets.GEMINI_API_KEY }}@g" main.js
          
          echo "✅ 金鑰替換動作已執行。"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
