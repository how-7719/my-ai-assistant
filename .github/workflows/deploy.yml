name: Deploy Ming's AI Assistant

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-with: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject API Key
        run: |
          # 1. 確保金鑰變數存在
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "❌ 錯誤：找不到 GEMINI_API_KEY，請檢查 Secret 設定。"
            exit 1
          fi

          # 2. 使用 @ 作為分隔符，強制替換 main.js 裡的標籤
          # 注意：這是最穩定的語法
          sed -i "s@__API_KEY_PLACEHOLDER__@${{ secrets.GEMINI_API_KEY }}@g" main.js
          
          echo "✅ 金鑰替換動作已執行。"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
