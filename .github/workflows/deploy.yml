name: Deploy Ming's AI Assistant

on:
  push:
    branches: ["main"]
  workflow_dispatch: # 讓你可以手動觸發測試

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-with: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject API Key
        run: |
          # 檢查 main.js 是否存在並進行替換
          if [ -f main.js ]; then
            sed -i 's/__API_KEY_PLACEHOLDER__/${{ secrets.GEMINI_API_KEY }}/g' main.js
            echo "API Key 注入成功！"
          else
            echo "找不到 main.js 檔案！"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
